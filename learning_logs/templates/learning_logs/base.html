<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Learning Log - Galactic Academy{% endblock title %}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 20%, #16213e 40%, #0f3460 70%, #000000 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .container {
            background: rgba(10, 10, 30, 0.85);
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2), 0 0 80px rgba(255, 215, 0, 0.1), inset 0 0 20px rgba(255, 215, 0, 0.05);
            max-width: 800px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            position: relative;
            z-index: 10;
        }
        h1 {
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 3px;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.6), 0 0 10px rgba(255, 215, 0, 0.4);
            text-transform: uppercase;
        }
        .galaxy-icon {
            font-size: 3em;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.7));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .description {
            color: #f0f0f0;
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }
        .nav-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffd700;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            z-index: 20;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #ffffff;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.9);
            transform: scale(1.05);
        }
        
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.3); }
        }
        @keyframes shooting-star {
            0% { transform: translateX(-100px) translateY(-100px) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 200px)) translateY(calc(100vh + 200px)) rotate(-45deg); opacity: 0; }
        }
        
        
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -2;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ffd700;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <a href="{% url 'learning_logs:index' %}" class="nav-link">Learning Log</a>
    
    <div class="stars">
        <div class="star" style="top: 5%; left: 10%; animation-delay: 0s;"></div>
        <div class="star" style="top: 15%; left: 25%; animation-delay: 0.5s;"></div>
        <div class="star" style="top: 25%; left: 40%; animation-delay: 1s;"></div>
        <div class="star" style="top: 35%; left: 60%; animation-delay: 1.5s;"></div>
        <div class="star" style="top: 45%; left: 75%; animation-delay: 2s;"></div>
        <div class="star" style="top: 55%; left: 85%; animation-delay: 2.5s;"></div>
        <div class="star" style="top: 65%; left: 15%; animation-delay: 3s;"></div>
        <div class="star" style="top: 75%; left: 30%; animation-delay: 3.5s;"></div>
        <div class="star" style="top: 85%; left: 50%; animation-delay: 4s;"></div>
        <div class="star" style="top: 95%; left: 70%; animation-delay: 4.5s;"></div>
    </div>
    
    
    
    {% block content %}{% endblock content %}
</body>
</html>
